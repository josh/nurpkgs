name: Update

on:
  schedule:
    - cron: "0 19 * * *" # 11am PST
  workflow_dispatch:

permissions:
  contents: write

env:
  NIXPKGS_ALLOW_UNFREE: "1"

jobs:
  update:
    strategy:
      fail-fast: false
      matrix:
        system:
          - aarch64-darwin
          # - aarch64-linux
          - x86_64-linux

    runs-on: [self-hosted, "${{ matrix.system }}"]

    steps:
      - uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        id: app-token
        with:
          app-id: ${{ vars.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}

      - name: Get GitHub App User ID
        id: get-user-id
        run: echo "user-id=$(gh api "/users/${{ steps.app-token.outputs.app-slug }}[bot]" --jq .id)" | tee -a "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}

      # - uses: DeterminateSystems/determinate-nix-action@32cb6a5ae30bb0dfc996fa7baf8bf1ed28442fa4 # v3.17.3
      #   with:
      #     extra-conf: |
      #       accept-flake-config = true

      # - uses: cachix/cachix-action@1eb2ef646ac0255473d23a5907ad7b04ce94065c # v17
      #   with:
      #     name: josh
      #     authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Configure git commit author
        run: |
          git config --local user.name '${{ steps.app-token.outputs.app-slug }}[bot]'
          git config --local user.email '${{ steps.get-user-id.outputs.user-id }}+${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com'

      - id: attrs
        name: Get package attributes to update
        run: |
          set -o pipefail
          nix eval --raw --impure --file ./internal/update-script-attrs.nix | tee "$GITHUB_OUTPUT"
        env:
          FLAKE_URI: ${{ github.workspace }}

      - name: Run update-script
        run: |
          set -o pipefail
          exit_code=0
          while read -r attr; do
            printf "\n\n==== Updating %s ====\n" "$attr" >&2
            if ! UPDATE_NIX_ATTR_PATH="$attr" nix run --file ./internal/update-script.nix; then
              echo "::error::Update failed for $attr" >&2
              exit_code=1
            fi
          done <<<"$(jq --raw-output '.[]' <<<"$UPDATE_NIX_ATTRS")"
          exit $exit_code
        env:
          FLAKE_URI: ${{ github.workspace }}
          UPDATE_NIX_ATTRS: ${{ steps.attrs.outputs.attrs }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
